<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latin Noun Cases</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .widget {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 30px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 25px;
            letter-spacing: -0.5px;
        }

        .cases-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .case-card {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.2s ease;
        }

        .case-card:hover {
            border-color: #3b82f6;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.15);
        }

        .case-name {
            font-size: 16px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .case-rule {
            font-size: 14px;
            color: #1e293b;
            font-weight: 500;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .case-example {
            font-size: 15px;
            font-weight: 600;
            color: #1d4ed8;
            background: rgba(29, 78, 216, 0.1);
            padding: 8px 12px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
        }

        .legend {
            font-size: 12px;
            color: #6b7280;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }

        @media (max-width: 480px) {
            .cases-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .widget {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="widget">
        <h1 class="title">Latin Noun Cases</h1>
        
        <div class="cases-grid">
            <div class="case-card">
                <div class="case-name">Nominative</div>
                <div class="case-rule">Subject of the sentence</div>
                <div class="case-example">puella</div>
            </div>

            <div class="case-card">
                <div class="case-name">Genitive</div>
                <div class="case-rule">Possession ("of")</div>
                <div class="case-example">puellae</div>
            </div>

            <div class="case-card">
                <div class="case-name">Dative</div>
                <div class="case-rule">Indirect object (to/for)</div>
                <div class="case-example">puellae</div>
            </div>

            <div class="case-card">
                <div class="case-name">Accusative</div>
                <div class="case-rule">Direct object</div>
                <div class="case-example">puellam</div>
            </div>

            <div class="case-card">
                <div class="case-name">Ablative</div>
                <div class="case-rule">From, by, with, in</div>
                <div class="case-example">puellā</div>
            </div>

            <div class="case-card">
                <div class="case-name">Vocative</div>
                <div class="case-rule">Direct address</div>
                <div class="case-example">puella</div>
            </div>
        </div>

        <div class="legend">
            Example: <strong>puella, puellae</strong> (2nd declension, "girl")
        </div>
    </div>
</body>
</html>
